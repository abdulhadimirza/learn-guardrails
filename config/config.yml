models:
  - type: main
    engine: openai
    model: llama-3.3-70b-versatile
    api_key_env_var: GROQ_API_KEY
    parameters:
      base_url: https://api.groq.com/openai/v1

rails:
  input:
    flows:
      - self check input
      - mask sensitive data on input
  output:
    flows:
      - self check output
      - self check facts
      - mask sensitive data on output
  config:
    sensitive_data_detection:
      input:
        entities:
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - CREDIT_CARD
          - IP_ADDRESS
          - CRYPTO
          - IBAN_CODE
          - US_SSN
          - US_PASSPORT
          - US_DRIVER_LICENSE
      output:
        entities:
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - CREDIT_CARD
          - IP_ADDRESS
          - CRYPTO
          - IBAN_CODE
          - US_SSN
          - US_PASSPORT
          - US_DRIVER_LICENSE
